<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}LinguaAI Translator{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Geist:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="nav-shell">
        <a class="brand" href="{{ url_for('home') }}">
          <img src="https://lh3.googleusercontent.com/aida/AP1WRLvi1Wd29wtJW9mAIE7Tet8-LSl6WBgzPKmzxHu2aMOM04rN_0WXjplqTvOSegcHmUMTWKelH6m-uYfNwwqRFxHBW1tpDjYjTmqaMJ8kfCIl4nzqki35tuS1_R9zdeM0e2ffEmVxIJ4PedSzcs_2RA5w8bBbH7jjB7aaT1khA1sFg6I9d-KrYMZh5_FCIkBuYFVtzNdzmpQcGCx_BsQuiOMIvJ38tu1RmQYLsr2FcHfInbM14wUltcJz7ho" alt="LinguaAI logo" />
          <span>LinguaAI</span>
        </a>
        <nav class="nav-links">
          <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="{{ url_for('home') }}">Home</a>
          <a class="nav-link {% if request.endpoint == 'translator' %}active{% endif %}" href="{{ url_for('translator') }}">Translator</a>
          <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="{{ url_for('about') }}">About</a>
          <a class="nav-link {% if request.endpoint == 'contact' %}active{% endif %}" href="{{ url_for('contact') }}">Contact</a>
        </nav>
        <a class="button pill" href="{{ url_for('translator') }}">Try Translator</a>
      </div>
    </header>

    <main class="page-shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <p>© 2026 LinguaAI · Built with Flask, Python, and Google Translate.</p>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
